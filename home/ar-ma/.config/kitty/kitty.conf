# Шрифт
font_family      Hack Nerd Font
font_size        13

# Цвета — матричный стиль
foreground       #00ff41
background       #0a0a0f
cursor           #00ff41
selection_foreground #0a0a0f
selection_background #00ff41

# Прозрачность с размытием
background_opacity 0.85
background_blur 20

# Окно без рамки
hide_window_decorations yes

# Отступы текста от краёв
window_padding_width 12 8

# Курсор — вертикальная линия
cursor_shape beam
cursor_beam_thickness 2.0

# Табы снизу в стиле powerline
tab_bar_style    powerline
tab_bar_edge     bottom
active_tab_foreground #0a0a0f
active_tab_background #00ff41
inactive_tab_foreground #008f11
inactive_tab_background #0a0a0f

# Zsh при старте
shell /bin/zsh
